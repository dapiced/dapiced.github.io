<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1772" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', Consolas, monospace">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#16202C" stroke-width="1"/>
    </pattern>
    <pattern id="hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="8" height="8" fill="#07090D"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#2A181A" stroke-width="3"/>
    </pattern>
    <radialGradient id="bang">
      <stop offset="0%" stop-color="#FFF6D9" stop-opacity="1"/>
      <stop offset="35%" stop-color="#F0B23E" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F0B23E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wedgeA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0B23E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F0B23E" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="wedgeB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0B23E" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#F0B23E" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="1772" fill="#0B0F14"/>
  <rect x="24" y="24" width="1152" height="1724" fill="none" stroke="#161D27" stroke-width="1"/>

  <!-- ═══════════ HEADER ═══════════ -->
  <text x="600" y="86" text-anchor="middle" font-size="12" letter-spacing="3" fill="#5A6A79">A CONVERSATION, DISTILLED · ON NOTHINGNESS, BOUNDARIES AND ROOT COMMITS</text>
  <text x="600" y="140" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="38" fill="#E7EDF4">“Why is there something rather than nothing?”</text>
  <text x="600" y="182" text-anchor="middle" font-size="16.5" fill="#F0B23E">Answer -a beginning is a boundary, not a transition. Nothingness has no address.</text>
  <line x1="80" y1="212" x2="1120" y2="212" stroke="#232B36" stroke-width="1"/>

  <!-- ═══════════ MODEL A ═══════════ -->
  <text x="80" y="252" font-size="13" letter-spacing="2" fill="#8FA0B0">MODEL A -THE INTUITION</text>
  <text x="1120" y="252" text-anchor="end" font-size="13" letter-spacing="2" fill="#E0564B">INCOHERENT ✕</text>

  <rect x="80" y="270" width="1040" height="230" rx="10" fill="#0D131B" stroke="#232B36" stroke-width="1"/>

  <!-- the “NOTHING” box: drawn, therefore already something -->
  <rect x="104" y="296" width="232" height="158" rx="6" fill="url(#hatch)" stroke="#E0564B" stroke-width="1.4" stroke-dasharray="5,5" opacity="0.9"/>
  <text x="220" y="382" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="30" fill="#66727F">“NOTHING”</text>
  <text x="220" y="410" text-anchor="middle" font-size="12.5" fill="#5A6A79">(a prior state)</text>
  <g transform="translate(220,330) rotate(-7)">
    <rect x="-84" y="-17" width="168" height="30" rx="4" fill="#E0564B" fill-opacity="0.07" stroke="#E0564B" stroke-width="1.3"/>
    <text x="0" y="4" text-anchor="middle" font-size="14" letter-spacing="2" fill="#E0564B">CONTRADICTION</text>
  </g>

  <!-- the impossible “transition” -->
  <line x1="342" y1="384" x2="436" y2="384" stroke="#E0564B" stroke-width="1.6" stroke-dasharray="6,5"/>
  <polygon points="448,384 434,377 434,391" fill="#E0564B"/>
  <text x="394" y="366" text-anchor="middle" font-size="12.5" fill="#E0564B">transition?</text>

  <!-- bang + universe (cartoon) -->
  <circle cx="464" cy="384" r="22" fill="url(#bang)"/>
  <circle cx="464" cy="384" r="4.5" fill="#FFF3D0"/>
  <polygon points="464,384 1100,312 1100,458" fill="url(#wedgeA)"/>
  <line x1="464" y1="384" x2="1100" y2="312" stroke="#F0B23E" stroke-width="1" opacity="0.35"/>
  <line x1="464" y1="384" x2="1100" y2="458" stroke="#F0B23E" stroke-width="1" opacity="0.35"/>
  <text x="800" y="392" text-anchor="middle" font-size="12.5" fill="#8B7A4F">universe</text>

  <text x="104" y="534" font-size="15.5" fill="#E0564B">✕</text>
  <text x="128" y="534" font-size="15.5" fill="#AEB9C4">To draw “nothing” is already to make it something -a region, a state, an instant.</text>
  <text x="128" y="560" font-size="15.5" fill="#AEB9C4">An instant of nothingness is an instant, hence something. The model contradicts itself.</text>

  <!-- ═══════════ MODEL B ═══════════ -->
  <text x="80" y="614" font-size="13" letter-spacing="2" fill="#8FA0B0">MODEL B -THE BOUNDARY</text>
  <text x="1120" y="614" text-anchor="end" font-size="13" letter-spacing="2" fill="#4CC38A">COHERENT ✓</text>

  <!-- the frame itself only begins at t₀: no left edge -->
  <rect x="436" y="632" width="684" height="274" fill="#0D131B"/>
  <rect x="436" y="632" width="684" height="274" fill="url(#grid)"/>
  <path d="M 436 632 H 1120 V 906 H 436" fill="none" stroke="#232B36" stroke-width="1"/>

  <!-- the boundary: the closed bracket of [0, +∞) -->
  <path d="M 452 646 H 438 V 892 H 452" fill="none" stroke="#F0B23E" stroke-width="3"/>

  <!-- to the left: nothing is drawn. not even a void. -->
  <text x="96" y="758" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="19" fill="#6E7B88">there is no “nothing” here —</text>
  <text x="96" y="790" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="19" fill="#6E7B88">there is no “here”.</text>

  <!-- time axis -->
  <line x1="452" y1="806" x2="1084" y2="806" stroke="#8FA0B0" stroke-width="1.6"/>
  <polygon points="1096,806 1082,799 1082,813" fill="#8FA0B0"/>
  <text x="1106" y="811" font-size="15" font-style="italic" fill="#8FA0B0">t</text>
  <line x1="466" y1="800" x2="466" y2="813" stroke="#F0B23E" stroke-width="1.6"/>
  <text x="466" y="836" text-anchor="middle" font-size="13.5" fill="#F0B23E">t₀ = 0</text>
  <text x="1052" y="836" text-anchor="middle" font-size="12" fill="#5A6A79">now</text>

  <!-- bang + universe (alive) -->
  <circle cx="466" cy="806" r="20" fill="url(#bang)"/>
  <circle cx="466" cy="806" r="4" fill="#FFF3D0"/>
  <polygon points="466,806 1096,718 1096,884" fill="url(#wedgeB)"/>
  <line x1="466" y1="806" x2="1096" y2="718" stroke="#F0B23E" stroke-width="1" opacity="0.3"/>
  <line x1="466" y1="806" x2="1096" y2="884" stroke="#F0B23E" stroke-width="1" opacity="0.3"/>
  <g fill="#F5E9C8">
    <circle cx="560" cy="795" r="1.1" opacity="0.5"/>
    <circle cx="610" cy="822" r="1.4" opacity="0.6"/>
    <circle cx="668" cy="780" r="1" opacity="0.4"/>
    <circle cx="700" cy="806" r="1.6" opacity="0.7"/>
    <circle cx="730" cy="835" r="1.1" opacity="0.45"/>
    <circle cx="772" cy="764" r="1.3" opacity="0.55"/>
    <circle cx="840" cy="850" r="1" opacity="0.4"/>
    <circle cx="872" cy="742" r="1.5" opacity="0.65"/>
    <circle cx="930" cy="815" r="1.2" opacity="0.5"/>
    <circle cx="986" cy="772" r="1" opacity="0.45"/>
    <circle cx="1030" cy="860" r="1.3" opacity="0.55"/>
    <circle cx="1060" cy="735" r="1.1" opacity="0.5"/>
  </g>
  <text x="812" y="782" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="17" fill="#C9A24B">something</text>

  <text x="460" y="930" font-size="12" fill="#5A6A79">← even the diagram's frame begins at t₀</text>

  <text x="104" y="964" font-size="15.5" fill="#4CC38A">✓</text>
  <text x="128" y="964" font-size="15.5" fill="#AEB9C4">A beginning is a boundary of time's domain -not a transition from a prior state.</text>
  <text x="128" y="990" font-size="15.5" fill="#AEB9C4">“Before t₀” is undefined -like “north of the North Pole”. Nothingness has nowhere to live.</text>

  <!-- ═══════════ THREE TOPOLOGIES ═══════════ -->
  <text x="80" y="1038" font-size="12.5" letter-spacing="2" fill="#5A6A79">THREE TOPOLOGIES OF THE PAST -NO INSTANT OF NOTHINGNESS IN ANY OF THEM</text>

  <!-- (−∞, +∞) -->
  <text x="240" y="1068" text-anchor="middle" font-size="17" fill="#E7EDF4">(−∞, +∞)</text>
  <line x1="112" y1="1094" x2="368" y2="1094" stroke="#8FA0B0" stroke-width="1.5"/>
  <polygon points="100,1094 114,1088 114,1100" fill="#8FA0B0"/>
  <polygon points="380,1094 366,1088 366,1100" fill="#8FA0B0"/>
  <text x="240" y="1124" text-anchor="middle" font-size="12.5" fill="#8FA0B0">no beginning</text>

  <!-- [0, +∞) -->
  <text x="600" y="1068" text-anchor="middle" font-size="17" fill="#E7EDF4">[0, +∞)</text>
  <line x1="460" y1="1094" x2="728" y2="1094" stroke="#8FA0B0" stroke-width="1.5"/>
  <polygon points="740,1094 726,1088 726,1100" fill="#8FA0B0"/>
  <circle cx="460" cy="1094" r="6" fill="#F0B23E"/>
  <text x="600" y="1124" text-anchor="middle" font-size="12.5" fill="#8FA0B0">a first instant -no transition</text>

  <!-- (0, +∞) -->
  <text x="960" y="1068" text-anchor="middle" font-size="17" fill="#E7EDF4">(0, +∞)</text>
  <line x1="820" y1="1094" x2="1088" y2="1094" stroke="#8FA0B0" stroke-width="1.5"/>
  <polygon points="1100,1094 1086,1088 1086,1100" fill="#8FA0B0"/>
  <circle cx="820" cy="1094" r="6" fill="#0B0F14" stroke="#F0B23E" stroke-width="2"/>
  <text x="960" y="1124" text-anchor="middle" font-size="12.5" fill="#8FA0B0">finite past -no first instant</text>

  <!-- ═══════════ SAME STRUCTURE, EVERYWHERE ═══════════ -->
  <text x="80" y="1178" font-size="13" letter-spacing="2" fill="#8FA0B0">THE SAME STRUCTURE, EVERYWHERE -THE “PREVIOUS” RELATION STOPS</text>
  <line x1="410" y1="1204" x2="410" y2="1330" stroke="#1B2530" stroke-width="1"/>
  <line x1="790" y1="1204" x2="790" y2="1330" stroke="#1B2530" stroke-width="1"/>

  <!-- GIT -->
  <text x="235" y="1214" text-anchor="middle" font-size="11.5" letter-spacing="2" fill="#5A6A79">GIT</text>
  <line x1="118" y1="1258" x2="358" y2="1258" stroke="#3A4552" stroke-width="2"/>
  <circle cx="118" cy="1258" r="13" fill="none" stroke="#F0B23E" stroke-width="1.3" opacity="0.5"/>
  <circle cx="118" cy="1258" r="8" fill="#F0B23E"/>
  <circle cx="198" cy="1258" r="7" fill="#8FA0B0"/>
  <circle cx="278" cy="1258" r="7" fill="#8FA0B0"/>
  <circle cx="358" cy="1258" r="7" fill="#E7EDF4"/>
  <text x="358" y="1232" text-anchor="middle" font-size="12" fill="#8FA0B0">HEAD</text>
  <text x="118" y="1292" text-anchor="middle" font-size="13" fill="#F0B23E">root</text>
  <text x="118" y="1312" text-anchor="middle" font-size="13" fill="#F0B23E">parent: —</text>
  <text x="235" y="1346" text-anchor="middle" font-size="13" fill="#8FA0B0">no parent ≠ parent “nothing”</text>

  <!-- PKI -->
  <text x="600" y="1214" text-anchor="middle" font-size="11.5" letter-spacing="2" fill="#5A6A79">PKI</text>
  <path d="M 478 1240 C 468 1208 528 1208 518 1238" fill="none" stroke="#F0B23E" stroke-width="1.6"/>
  <polygon points="518,1240 511,1230 524,1229" fill="#F0B23E"/>
  <text x="498" y="1200" text-anchor="middle" font-size="11.5" fill="#F0B23E">self-signed</text>
  <rect x="448" y="1240" width="100" height="38" rx="6" fill="#10161F" stroke="#F0B23E" stroke-width="1.3"/>
  <text x="498" y="1264" text-anchor="middle" font-size="12.5" fill="#C6D0DA">Root CA</text>
  <line x1="548" y1="1259" x2="568" y2="1259" stroke="#3A4552" stroke-width="1.6"/>
  <polygon points="576,1259 564,1253 564,1265" fill="#3A4552"/>
  <rect x="576" y="1240" width="84" height="38" rx="6" fill="#10161F" stroke="#3A4552" stroke-width="1.2"/>
  <text x="618" y="1264" text-anchor="middle" font-size="12.5" fill="#C6D0DA">Int. CA</text>
  <line x1="660" y1="1259" x2="680" y2="1259" stroke="#3A4552" stroke-width="1.6"/>
  <polygon points="688,1259 676,1253 676,1265" fill="#3A4552"/>
  <rect x="688" y="1240" width="76" height="38" rx="6" fill="#10161F" stroke="#3A4552" stroke-width="1.2"/>
  <text x="726" y="1264" text-anchor="middle" font-size="12.5" fill="#C6D0DA">leaf</text>
  <text x="600" y="1346" text-anchor="middle" font-size="13" fill="#8FA0B0">the chain of trust terminates on itself</text>

  <!-- SETS -->
  <text x="965" y="1214" text-anchor="middle" font-size="11.5" letter-spacing="2" fill="#5A6A79">SETS</text>
  <text y="1266" font-size="21" fill="#E7EDF4"><tspan x="838" fill="#F0B23E">∅</tspan><tspan x="874" fill="#5A6A79">→</tspan><tspan x="912">{∅}</tspan><tspan x="976" fill="#5A6A79">→</tspan><tspan x="1014">{∅,{∅}}</tspan></text>
  <text y="1296" font-size="12.5" fill="#5A6A79"><tspan x="842">0</tspan><tspan x="928">1</tspan><tspan x="1054">2</tspan></text>
  <text x="965" y="1346" text-anchor="middle" font-size="13" fill="#8FA0B0">∅ exists -empty of content, not of being</text>

  <text x="600" y="1398" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="17" fill="#AEB9C4">The relation doesn't point to nothing -it simply ceases to apply.</text>

  <!-- ═══════════ DOUBLE LOCK ═══════════ -->
  <text x="80" y="1442" font-size="13" letter-spacing="2" fill="#8FA0B0">DOUBLE LOCK</text>

  <rect x="80" y="1458" width="500" height="96" rx="10" fill="#0D131B" stroke="#232B36" stroke-width="1"/>
  <g transform="translate(112,1488)">
    <path d="M -6 0 v -6 a 6 6 0 0 1 12 0 v 6" stroke="#4CC38A" stroke-width="2" fill="none"/>
    <rect x="-10" y="0" width="20" height="15" rx="3" stroke="#4CC38A" stroke-width="2" fill="none"/>
  </g>
  <text x="136" y="1494" font-size="13.5" letter-spacing="2" fill="#C6D0DA">TEMPORAL LOCK</text>
  <text x="104" y="1522" font-size="15" fill="#8FA0B0">No instant t at which nothing exists,</text>
  <text x="104" y="1545" font-size="15" fill="#8FA0B0">and no “before t₀” to house the void.</text>

  <rect x="620" y="1458" width="500" height="96" rx="10" fill="#0D131B" stroke="#232B36" stroke-width="1"/>
  <g transform="translate(652,1488)">
    <path d="M -6 0 v -6 a 6 6 0 0 1 12 0 v 6" stroke="#4CC38A" stroke-width="2" fill="none"/>
    <rect x="-10" y="0" width="20" height="15" rx="3" stroke="#4CC38A" stroke-width="2" fill="none"/>
  </g>
  <text x="676" y="1494" font-size="13.5" letter-spacing="2" fill="#C6D0DA">MODAL LOCK</text>
  <text x="644" y="1522" font-size="15" fill="#8FA0B0">“There is nothing” would be a truth.</text>
  <text x="644" y="1545" font-size="15" fill="#8FA0B0">And a truth is already something.</text>

  <!-- ═══════════ CONCLUSION ═══════════ -->
  <line x1="80" y1="1592" x2="1120" y2="1592" stroke="#232B36" stroke-width="1"/>
  <text x="600" y="1658" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="42" fill="#E7EDF4">“Nothing was never on the menu.”</text>
  <text x="600" y="1698" text-anchor="middle" font-size="15.5" fill="#8FA0B0">one question remains -why this menu? every explanation terminates on a self-signed root.</text>
  <text x="600" y="1736" text-anchor="middle" font-size="11" fill="#4A5866">// established in four messages, without ever meeting the void · 2026-07-02</text>
</svg>
