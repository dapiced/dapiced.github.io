<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="L'étoile Vincenzo D'Apice dans la constellation d'Andromède">
  <defs>
    <radialGradient id="vbg" cx="55%" cy="30%" r="95%">
      <stop offset="0%" stop-color="#101b36"/>
      <stop offset="55%" stop-color="#0a1124"/>
      <stop offset="100%" stop-color="#04060f"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9a8" stop-opacity="0.95"/>
      <stop offset="35%" stop-color="#e3b341" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e3b341" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="galaxyGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cfe4ff" stop-opacity="0.8"/>
      <stop offset="45%" stop-color="#8fb8ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8fb8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="vsoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.6"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="900" height="480" rx="16" fill="url(#vbg)"/>

  <!-- background stars -->
  <g fill="#dbe9ff">
    <circle cx="60" cy="60" r="1"/><circle cx="140" cy="120" r="0.8"/><circle cx="220" cy="55" r="1.1"/>
    <circle cx="330" cy="95" r="0.8"/><circle cx="410" cy="45" r="1"/><circle cx="600" cy="70" r="0.9"/>
    <circle cx="680" cy="120" r="0.8"/><circle cx="790" cy="60" r="1.1"/><circle cx="850" cy="150" r="0.8"/>
    <circle cx="90" cy="250" r="0.9"/><circle cx="200" cy="210" r="0.8"/><circle cx="620" cy="280" r="0.9"/>
    <circle cx="760" cy="330" r="0.8"/><circle cx="840" cy="260" r="1"/><circle cx="70" cy="420" r="0.9"/>
    <circle cx="300" cy="430" r="0.8"/><circle cx="560" cy="420" r="0.9"/><circle cx="660" cy="390" r="0.8"/>
  </g>
  <g fill="#ffffff">
    <circle cx="180" cy="160" r="1.3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="550" cy="60" r="1.2"><animate attributeName="opacity" values="1;0.2;1" dur="4.4s" begin="0.9s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="200" r="1.3"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.1s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="130" cy="330" r="1.2"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4s" begin="0.4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- constellation label -->
  <text x="450" y="255" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="14" fill="#22304f" opacity="0.9">ANDROMEDA</text>

  <!-- Andromeda galaxy M31 -->
  <g>
    <circle cx="463" cy="112" r="34" fill="url(#galaxyGlow)" opacity="0.85">
      <animate attributeName="opacity" values="0.6;0.95;0.6" dur="7s" repeatCount="indefinite"/>
    </circle>
    <ellipse cx="463" cy="112" rx="26" ry="9" fill="#cfe4ff" opacity="0.35" transform="rotate(-28 463 112)"/>
    <ellipse cx="463" cy="112" rx="14" ry="4.5" fill="#e6f1ff" opacity="0.6" transform="rotate(-28 463 112)"/>
    <text x="463" y="76" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#8fb8ff" opacity="0.9">Galaxie d'Andromède · M31</text>
  </g>

  <!-- constellation chain: alpha - delta - beta - gamma, branch beta - mu - nu -->
  <g stroke="#58a6ff" stroke-width="1" opacity="0.4">
    <line x1="150" y1="390" x2="280" y2="350"/>
    <line x1="280" y1="350" x2="430" y2="300"/>
    <line x1="430" y1="300" x2="720" y2="200"/>
    <line x1="430" y1="300" x2="480" y2="225"/>
    <line x1="480" y1="225" x2="525" y2="150"/>
  </g>
  <!-- the way from the star to the galaxy -->
  <line x1="525" y1="150" x2="472" y2="120" stroke="#e3b341" stroke-width="1" opacity="0.5" stroke-dasharray="4 5">
    <animate attributeName="stroke-dashoffset" from="90" to="0" dur="10s" repeatCount="indefinite"/>
  </line>

  <!-- chain stars -->
  <g fill="#c9d1d9">
    <circle cx="150" cy="390" r="4"/>
    <circle cx="280" cy="350" r="3"/>
    <circle cx="430" cy="300" r="4.4"/>
    <circle cx="720" cy="200" r="4.2"/>
    <circle cx="480" cy="225" r="2.8"/>
  </g>
  <g font-family="Consolas, 'Courier New', monospace" font-size="10.5" fill="#6e7f9b">
    <text x="150" y="412" text-anchor="middle">α Alpheratz</text>
    <text x="280" y="372" text-anchor="middle">δ And</text>
    <text x="430" y="322" text-anchor="middle">β Mirach</text>
    <text x="720" y="222" text-anchor="middle">γ Almach</text>
    <text x="497" y="238" text-anchor="start">μ And</text>
  </g>

  <!-- Vincenzo's star -->
  <g>
    <circle cx="525" cy="150" r="30" fill="url(#goldGlow)">
      <animate attributeName="r" values="24;34;24" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>
    <path d="M 525 138 L 528 147 L 537 150 L 528 153 L 525 162 L 522 153 L 513 150 L 522 147 Z" fill="#ffe9a8">
      <animateTransform attributeName="transform" type="rotate" from="0 525 150" to="8 525 150" dur="6s" values="0 525 150; 6 525 150; 0 525 150" repeatCount="indefinite"/>
    </path>
    <circle cx="525" cy="150" r="3.2" fill="#fff6d8" filter="url(#vsoft)"/>
  </g>
  <text x="560" y="145" text-anchor="start" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="700" fill="#e3b341">✦ Vincenzo D'Apice</text>
  <text x="560" y="166" text-anchor="start" font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#9baec8">RA 00h 49m 55.1s · DEC +41° 11′ 56.1″</text>

  <!-- caption -->
  <text x="450" y="440" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="20" font-style="italic" fill="#c9d1d9">« À bientôt Papa ! »</text>
  <text x="450" y="463" text-anchor="middle" font-family="Consolas, 'Courier New', monospace" font-size="10.5" letter-spacing="1" fill="#6e7f9b">ENREGISTRÉE LE 8 AOÛT 2022 · MAGNITUDE 4,53 · VISIBLE À L'ŒIL NU · 617 ANNÉES-LUMIÈRE</text>
</svg>
